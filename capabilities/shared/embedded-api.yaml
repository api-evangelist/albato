naftiko: "1.0.0-alpha1"

info:
  label: Albato Embedded API
  description: >-
    Team, user, connector, and template management for Albato Embedded iPaaS,
    enabling SaaS companies to provide white-label integrations.
  tags:
    - Albato
    - Embedded iPaaS
    - Teams
    - White-Label
    - SaaS
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ALBATO_API_KEY: ALBATO_API_KEY

capability:
  consumes:
    - type: http
      namespace: albato-embedded
      baseUri: "https://albato.com/api/v1/embedded"
      auth:
        type: apiKey
        header: Authorization
        value: "{{env.ALBATO_API_KEY}}"
      resources:
        - name: teams
          path: /teams
          description: Embedded team management
          operations:
            - name: list-teams
              method: GET
              description: List all embedded teams
              outputParameters:
                - name: teams
                  type: object
                  value: "$."
            - name: create-team
              method: POST
              description: Create a new embedded team
              inputParameters:
                - name: body
                  type: object
                  in: body
              outputParameters:
                - name: team
                  type: object
                  value: "$."
            - name: get-team
              method: GET
              description: Get an embedded team by ID
              inputParameters:
                - name: id
                  type: string
                  in: path
              outputParameters:
                - name: team
                  type: object
                  value: "$."
        - name: connectors
          path: /connectors
          description: Available app connectors
          operations:
            - name: list-connectors
              method: GET
              description: List available app connectors
              inputParameters:
                - name: search
                  type: string
                  in: query
              outputParameters:
                - name: connectors
                  type: object
                  value: "$."
        - name: templates
          path: /templates
          description: Automation templates
          operations:
            - name: list-templates
              method: GET
              description: List automation templates
              outputParameters:
                - name: templates
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: albato-embedded-api
      resources:
        - path: /v1/teams
          name: teams
          operations:
            - method: GET
              name: list-teams
              description: List embedded teams
              call: "albato-embedded.list-teams"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: albato-embedded-mcp
      transport: http
      tools:
        - name: list-albato-teams
          description: List all embedded teams (customer accounts) in Albato
          hints:
            readOnly: true
            openWorld: false
          call: "albato-embedded.list-teams"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-albato-connectors
          description: Browse available app connectors for Albato Embedded integrations
          hints:
            readOnly: true
            openWorld: false
          call: "albato-embedded.list-connectors"
          inputParameters:
            - name: search
              type: string
              description: Search term to filter connectors
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-albato-templates
          description: List automation templates available for embedded use
          hints:
            readOnly: true
            openWorld: false
          call: "albato-embedded.list-templates"
          outputParameters:
            - type: object
              mapping: "$."
