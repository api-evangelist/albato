naftiko: 1.0.0-alpha2
info:
  label: Albato iPaaS Automation
  description: Workflow capability for managing no-code automation and embedded iPaaS functionality in Albato. Combines automation
    workflow management and embedded team management to support operations teams and SaaS developers.
  tags:
  - Albato
  - iPaaS
  - No-Code Automation
  - Workflow
  - Embedded Integration
  - SaaS
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    ALBATO_API_KEY: ALBATO_API_KEY
capability:
  consumes:
  - type: http
    namespace: albato-automations
    baseUri: https://albato.com/api/v1
    auth:
      type: apiKey
      header: Authorization
      value: '{{env.ALBATO_API_KEY}}'
    resources:
    - name: automations
      path: /automations
      operations:
      - name: list-automations
        method: GET
        description: List all automation workflows
        outputParameters:
        - name: automations
          type: object
          value: $.
      - name: get-automation
        method: GET
        description: Get an automation by ID
        inputParameters:
        - name: id
          type: string
          in: path
        outputParameters:
        - name: automation
          type: object
          value: $.
      - name: create-automation
        method: POST
        description: Create a new automation
        inputParameters:
        - name: body
          type: object
          in: body
        outputParameters:
        - name: automation
          type: object
          value: $.
      - name: enable-automation
        method: POST
        description: Enable an automation
        inputParameters:
        - name: id
          type: string
          in: path
        outputParameters:
        - name: automation
          type: object
          value: $.
      - name: disable-automation
        method: POST
        description: Disable an automation
        inputParameters:
        - name: id
          type: string
          in: path
        outputParameters:
        - name: automation
          type: object
          value: $.
      - name: list-executions
        method: GET
        description: List execution history
        inputParameters:
        - name: id
          type: string
          in: path
        outputParameters:
        - name: executions
          type: object
          value: $.
  - type: http
    namespace: albato-embedded
    baseUri: https://albato.com/api/v1/embedded
    auth:
      type: apiKey
      header: Authorization
      value: '{{env.ALBATO_API_KEY}}'
    resources:
    - name: teams
      path: /teams
      description: Embedded team management
      operations:
      - name: list-teams
        method: GET
        description: List all embedded teams
        outputParameters:
        - name: teams
          type: object
          value: $.
      - name: create-team
        method: POST
        description: Create a new embedded team
        inputParameters:
        - name: body
          type: object
          in: body
        outputParameters:
        - name: team
          type: object
          value: $.
      - name: get-team
        method: GET
        description: Get an embedded team by ID
        inputParameters:
        - name: id
          type: string
          in: path
        outputParameters:
        - name: team
          type: object
          value: $.
    - name: connectors
      path: /connectors
      description: Available app connectors
      operations:
      - name: list-connectors
        method: GET
        description: List available app connectors
        inputParameters:
        - name: search
          type: string
          in: query
        outputParameters:
        - name: connectors
          type: object
          value: $.
    - name: templates
      path: /templates
      description: Automation templates
      operations:
      - name: list-templates
        method: GET
        description: List automation templates
        outputParameters:
        - name: templates
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: albato-ipaas-api
    description: Unified REST API for Albato iPaaS automation management.
    resources:
    - path: /v1/automations
      name: automations
      description: Automation workflows
      operations:
      - method: GET
        name: list-automations
        description: List all automation workflows
        call: albato-automations.list-automations
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/teams
      name: teams
      description: Embedded teams
      operations:
      - method: GET
        name: list-teams
        description: List embedded teams
        call: albato-embedded.list-teams
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/connectors
      name: connectors
      description: App connectors
      operations:
      - method: GET
        name: list-connectors
        description: List available connectors
        call: albato-embedded.list-connectors
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: albato-ipaas-mcp
    transport: http
    description: MCP server for AI-assisted Albato automation and embedded iPaaS management.
    tools:
    - name: list-albato-automations
      description: List all Albato automation workflows with their status, trigger counts, and success/error rates.
      hints:
        readOnly: true
        openWorld: false
      call: albato-automations.list-automations
      outputParameters:
      - type: object
        mapping: $.
    - name: get-albato-automation
      description: Get details and configuration for a specific Albato automation.
      hints:
        readOnly: true
        openWorld: false
      call: albato-automations.get-automation
      inputParameters:
      - name: id
        type: string
        description: Automation ID
      outputParameters:
      - type: object
        mapping: $.
    - name: list-albato-executions
      description: Get execution history for an Albato automation including success/error rates and step completion details.
      hints:
        readOnly: true
        openWorld: false
      call: albato-automations.list-executions
      inputParameters:
      - name: id
        type: string
        description: Automation ID
      outputParameters:
      - type: object
        mapping: $.
    - name: list-albato-embedded-teams
      description: List all embedded teams (customer accounts) in Albato Embedded iPaaS with active automation and transaction
        counts.
      hints:
        readOnly: true
        openWorld: false
      call: albato-embedded.list-teams
      outputParameters:
      - type: object
        mapping: $.
    - name: list-albato-connectors
      description: Browse 1,000+ available app connectors for Albato Embedded. Search by name or filter to find specific integrations.
      hints:
        readOnly: true
        openWorld: false
      call: albato-embedded.list-connectors
      inputParameters:
      - name: search
        type: string
        description: Search term to filter connectors
      outputParameters:
      - type: object
        mapping: $.
    - name: list-albato-templates
      description: List automation templates available for Albato Embedded use.
      hints:
        readOnly: true
        openWorld: false
      call: albato-embedded.list-templates
      outputParameters:
      - type: object
        mapping: $.
