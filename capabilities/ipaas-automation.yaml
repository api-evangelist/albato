naftiko: "1.0.0-alpha1"

info:
  label: Albato iPaaS Automation
  description: >-
    Workflow capability for managing no-code automation and embedded iPaaS
    functionality in Albato. Combines automation workflow management and
    embedded team management to support operations teams and SaaS developers.
  tags:
    - Albato
    - iPaaS
    - No-Code Automation
    - Workflow
    - Embedded Integration
    - SaaS
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ALBATO_API_KEY: ALBATO_API_KEY

capability:
  consumes:
    - import: albato-automations
      location: ./shared/automations-api.yaml
    - import: albato-embedded
      location: ./shared/embedded-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: albato-ipaas-api
      description: Unified REST API for Albato iPaaS automation management.
      resources:
        - path: /v1/automations
          name: automations
          description: Automation workflows
          operations:
            - method: GET
              name: list-automations
              description: List all automation workflows
              call: "albato-automations.list-automations"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/teams
          name: teams
          description: Embedded teams
          operations:
            - method: GET
              name: list-teams
              description: List embedded teams
              call: "albato-embedded.list-teams"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/connectors
          name: connectors
          description: App connectors
          operations:
            - method: GET
              name: list-connectors
              description: List available connectors
              call: "albato-embedded.list-connectors"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: albato-ipaas-mcp
      transport: http
      description: MCP server for AI-assisted Albato automation and embedded iPaaS management.
      tools:
        - name: list-albato-automations
          description: >-
            List all Albato automation workflows with their status, trigger counts,
            and success/error rates.
          hints:
            readOnly: true
            openWorld: false
          call: "albato-automations.list-automations"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-albato-automation
          description: Get details and configuration for a specific Albato automation.
          hints:
            readOnly: true
            openWorld: false
          call: "albato-automations.get-automation"
          inputParameters:
            - name: id
              type: string
              description: Automation ID
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-albato-executions
          description: >-
            Get execution history for an Albato automation including success/error
            rates and step completion details.
          hints:
            readOnly: true
            openWorld: false
          call: "albato-automations.list-executions"
          inputParameters:
            - name: id
              type: string
              description: Automation ID
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-albato-embedded-teams
          description: >-
            List all embedded teams (customer accounts) in Albato Embedded iPaaS
            with active automation and transaction counts.
          hints:
            readOnly: true
            openWorld: false
          call: "albato-embedded.list-teams"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-albato-connectors
          description: >-
            Browse 1,000+ available app connectors for Albato Embedded.
            Search by name or filter to find specific integrations.
          hints:
            readOnly: true
            openWorld: false
          call: "albato-embedded.list-connectors"
          inputParameters:
            - name: search
              type: string
              description: Search term to filter connectors
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-albato-templates
          description: List automation templates available for Albato Embedded use.
          hints:
            readOnly: true
            openWorld: false
          call: "albato-embedded.list-templates"
          outputParameters:
            - type: object
              mapping: "$."
