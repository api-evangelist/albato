  - type: Features
    data:
      - name: No-Code Automation Builder
        description: >-
          Visual automation builder for creating multi-step workflows connecting
          1,000+ apps without writing code, with conditions, delays, and data
          transformations.
      - name: 1,000+ App Integrations
        description: >-
          Pre-built connectors for CRM, marketing, e-commerce, communication,
          and productivity apps including HubSpot, Salesforce, Google Workspace,
          Slack, Shopify, and more.
      - name: Albato Embedded iPaaS
        description: >-
          White-label integration platform for SaaS companies to embed Albato's
          automation capabilities natively in their products with full branding
          control.
      - name: Multi-Step Workflows
        description: >-
          Support for complex automations with sequential and conditional steps,
          delays, loops, and data transformations without coding.
      - name: Real-Time and Scheduled Triggers
        description: >-
          Webhook-based real-time triggers for instant event processing and
          scheduled polling triggers for API-based app integrations.
      - name: Custom App Integrator
        description: >-
          Build custom API connectors from any REST API using the App Integrator
          without development handoff, supporting all major auth methods.
      - name: Execution Monitoring
        description: >-
          Detailed execution history with step-level logging, success/error rates,
          real-time notifications, and dashboard insights.
      - name: Data Transformation
        description: >-
          Built-in data mapping, field transformation, and JavaScript code steps
          for processing data between connected apps.
  - type: UseCases
    data:
      - name: CRM and Marketing Automation
        description: >-
          Sync leads between CRM and marketing tools, automate email campaigns,
          and route prospects based on behavioral conditions.
      - name: E-Commerce Order Processing
        description: >-
          Automate order notifications, inventory updates, fulfillment triggers,
          and customer communication across e-commerce platforms.
      - name: SaaS Native Integration Delivery
        description: >-
          Use Albato Embedded to offer customers white-labeled integrations in
          your SaaS product without in-house iPaaS development.
      - name: Customer Support Automation
        description: >-
          Route tickets, trigger alerts, and sync customer data between helpdesk,
          CRM, and communication platforms automatically.
      - name: Data Synchronization
        description: >-
          Keep data consistent across business systems with bidirectional syncs,
          scheduled automations, and event-driven updates.
  - type: Integrations
    data:
      - name: HubSpot
        description: CRM and marketing automation for contact and deal management.
      - name: Salesforce
        description: Enterprise CRM for sales pipeline and opportunity workflows.
      - name: Google Workspace
        description: Google Sheets, Gmail, Drive, Calendar, and Forms integrations.
      - name: Slack
        description: Team messaging integration for workflow notifications and alerts.
      - name: Shopify
        description: E-commerce integration for order, product, and customer automation.
      - name: Stripe
        description: Payment processing integration for subscription and payment workflows.
      - name: Notion
        description: Workspace integration for task and project data synchronization.
      - name: Airtable
        description: Database integration for spreadsheet and grid data workflows.
